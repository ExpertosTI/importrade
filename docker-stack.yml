version: '3.8'

services:
  # -------------------------------------------------------------------------
  # POSTGRESQL DATABASE
  # -------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: importrade
    volumes:
      - importrade_db_vol:/var/lib/postgresql/data
    networks:
      - importrade_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.25'    # Max 25% of 1 CPU
          memory: 256M    # Hard limit
        reservations:
          cpus: '0.10'
          memory: 64M

  # -------------------------------------------------------------------------
  # WEB APPLICATION (Next.js + API)
  # -------------------------------------------------------------------------
  app:
    image: ghcr.io/expertosti/importrade:latest
    environment:
      - NODE_ENV=production
      # Database Connection
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/importrade?schema=public
      
      # Authentication
      - NEXTAUTH_URL=https://importrade.renace.space
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}

      # SMTP Email Service
      - SMTP_HOST=smtp.hostinger.com
      - SMTP_PORT=465
      - SMTP_USER=info@renace.space
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=ImporTrade <info@renace.space>
      
    networks:
      - importrade_internal
      - RenaceNet
    depends_on:
      - db
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.50'    # Max 50% of 1 CPU
          memory: 512M    # Max 512MB RAM
        reservations:
          cpus: '0.10'
          memory: 128M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.importrade.rule=Host(`importrade.renace.space`)"
        - "traefik.http.routers.importrade.entrypoints=websecure"
        - "traefik.http.routers.importrade.tls=true"
        - "traefik.http.routers.importrade.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.importrade.loadbalancer.server.port=3000"
        - "traefik.docker.network=RenaceNet"

networks:
  importrade_internal:
    driver: overlay
  RenaceNet:
    external: true

volumes:
  importrade_db_vol:
